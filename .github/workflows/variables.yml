name: Messages
on: push
jobs:
  messenger:
    name: Send a direct message
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
      - name: Get the author
        run: |
          AUTHOR_EMAIL=$(git log -1 --pretty=format:'%ae')
          echo "Author email is: $AUTHOR_EMAIL"
          echo "AUTHOR_EMAIL=$AUTHOR_EMAIL" >> $GITHUB_ENV
      - name: Lookup by email
        id: email
        uses: slackapi/slack-github-action@v2.0.0
        with:
          errors: true
          method: users.lookupByEmail
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            email: "${{ env.AUTHOR_EMAIL }}"
      - name: Find the user ID
        if: ${{ steps.email.outputs.ok }}
        run: |
          SLACK_USER_ID=$(echo '${{ steps.email.outputs.response }}' | jq -r '.user.id')
          echo "SLACK_USER_ID=$SLACK_USER_ID" >> $GITHUB_ENV
      - name: Send a message
        if: ${{ steps.email.outputs.ok }}
        uses: slackapi/slack-github-action@v2.0.0
        with:
          errors: true
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ env.SLACK_USER_ID }}
            text: "greetings :octocatted:"

      - name: Initiate a deployment
        uses: slackapi/slack-github-action@v2.0.0
        id: deployment_message_1
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: "Deployment started :eyes:"
      - name: Conclude the deployment
        if: ${{ steps.deployment_message_1.outputs.ok }}
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: "${{ steps.deployment_message_1.outputs.channel_id }}"
            thread_ts: "${{ steps.deployment_message_1.outputs.ts }}"
            text: "Deployment finished! :rocket:"
