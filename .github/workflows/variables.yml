name: Messages
on: push
jobs:
  messenger:
    name: Send a direct message
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
      - name: Get the author
        run: |
          AUTHOR_EMAIL=$(git log -1 --pretty=format:'%ae')
          echo "Author email is: $AUTHOR_EMAIL"
          echo "AUTHOR_EMAIL=$AUTHOR_EMAIL" >> $GITHUB_ENV
      - name: Lookup by email
        id: email
        uses: slackapi/slack-github-action@v2.0.0
        with:
          errors: true
          method: users.lookupByEmail
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            email: "${{ env.AUTHOR_EMAIL }}"
      - name: Find the user ID
        if: ${{ steps.email.outputs.ok }}
        run: |
          SLACK_USER_ID=$(echo '${{ steps.email.outputs.response }}' | jq -r '.user.id')
          echo "SLACK_USER_ID=$SLACK_USER_ID" >> $GITHUB_ENV
      - name: Send a message
        if: ${{ steps.email.outputs.ok }}
        uses: slackapi/slack-github-action@v2.0.0
        with:
          errors: true
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ env.SLACK_USER_ID }}
            text: "greetings :octocatted:"
      - name: Share an update
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          payload-file-path: ./example.json
          payload-templated: true
          token: ${{ secrets.SLACK_BOT_TOKEN }}
        env:
          COMMIT_HASH: ${{ github.sha || '' }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
      - name: Sets a commit message
        run: |
          COMMIT_MSG="hello world"
          echo "COMMIT_MSG=$COMMIT_MSG" >> $GITHUB_ENV
      - name: Echos environment variables
        uses: slackapi/slack-github-action@v2.0.0
        with:
          errors: true
          method: chat.postMessage
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            channel: ${{ secrets.SLACK_CHANNEL_ID }}
            text: example
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: "*:fire: ${{ github.actor }} broke the ${{ github.workflow }} job :fire:*\n\n${{ env.COMMIT_MSG }}\n${{github.sha}}"
                accessory:
                  type: image
                  image_url: https://tenor.com/view/mochi-mochi-peach-cat-cat-kitty-animated-cry-gif-17774448
                  alt_text: cat
              - type: actions
                elements:
                  - type: button
                    text:
                      - type: plain_text
                        text: "View Job"
                    url: "https://github.com//${{ github.repository}}/actions/runs/${{ github.run_id }}"
