name: Templatize variables

on: push

jobs:
  templatize:
    name: Replace placeholders
    runs-on: ubuntu-latest
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
      - name: Get the author
        run: |
          AUTHOR_EMAIL=$(git log -1 --pretty=format:'%ae')
          echo "Author email is: $AUTHOR_EMAIL"
          echo "AUTHOR_EMAIL=$AUTHOR_EMAIL" >> $GITHUB_ENV
      - name: Lookup by email
        id: user
        uses: slackapi/slack-github-action@v2.0.0
        with:
          errors: true
          method: users.lookupByEmail
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload: |
            email: "${{ env.AUTHOR_EMAIL }}"
      - name: Parse JSON and Set SLACK_USER_ID
        if: ${{ steps.user.outputs.ok }}
        run: |
          SLACK_USER_ID=$(echo "${{ steps.user.outputs.response }}" | jq -r '.user.id')
          echo "SLACK_USER_ID=$SLACK_USER_ID" >> $GITHUB_ENV
      - name: Send a message to the user
        if: ${{ steps.user.outputs.ok }}
        uses: slackapi/slack-github-action@v2.0.0
        with:
          method: chat.postMessage
          payload: |
            channel: ${{ github.SLACK_USER_ID }}
            text: "hello again."
