name: Templatize variables

on: push

jobs:
  templatize:
    name: Replace placeholders
    runs-on: ubuntu-latest
    steps:
      - name: Find the actor
        uses: slackapi/slack-github-action@v2.0.0
        with:
          errors: true
          method: users.lookupByEmail
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          payload-templated: true
          payload: |
            email: "${{ github.actor }}"
