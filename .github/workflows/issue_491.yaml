# https://github.com/slackapi/slack-github-action/issues/491
name: "Issue #491"
on:
  pull_request:
jobs:
  run:
    name: "Tokenized images are truncated"
    runs-on: ubuntu-latest
    steps:
      - name: "Source image is found"
        uses: slackapi/slack-github-action@v2.1.1
        with:
          token: ${{ secrets.SLACK_BOT_TOKEN }}
          method: chat.postMessage
          errors: "true"
          payload: |
            channel: "${{ secrets.SLACK_CHANNEL_ID }}"
            text: "hello!"
            blocks:
              - type: section
                text:
                  type: mrkdwn
                  text: |-
                    hello!
                accessory:
                  type: image
                  image_url: >-
                    https://private-user-images.githubusercontent.com/18134219/487936369-668c92cf-7cb1-4d37-bbae-970a2eeb50b3.png?jwt=eyJ0eXAiOiJKV1QiLCJhbGciOiJIUzI1NiJ9..w45x6EWkgecIUfCquBqZk9RRqjO0zCtCdKsSo9Ve4og
                  alt_text: Logo
